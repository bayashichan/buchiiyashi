<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公式LINE 出展申し込み</title>

    <!-- ===================================================================
         トラッキングタグ（計測用）
         Google サイトのライン登録ボタンからこのページに遷移させ、
         リード（Lead）を発火させてから公式LINEへ転送する。
         インスタ等のアプリ内ブラウザでも、自社ドメインの通常ページなので
         タグが確実に発火する。
         =================================================================== -->
    <!-- Meta Pixel -->
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '1143852114505095');
    fbq('track', 'PageView');
    fbq('track', 'Lead');
    </script>
    <!-- End Meta Pixel -->

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Yu Gothic', -apple-system, sans-serif;
            background-color: #f0fdf4;
            color: #06803a;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            opacity: 0;
            animation: fadeIn 0.3s ease forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }
        .spinner {
            width: 34px;
            height: 34px;
            border: 3px solid rgba(6, 199, 85, 0.2);
            border-top-color: #06C755;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { font-size: 0.9rem; letter-spacing: 0.05em; color: #06803a; }
        .fallback { font-size: 0.8rem; margin-top: 8px; }
        .fallback a { color: #06803a; }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <div class="loader-text">LINEへ移動しています…</div>
        <div class="fallback">
            自動で移動しない場合は
            <a href="https://lin.ee/43uE1gC">こちら</a>
        </div>
    </div>

    <!-- JS が無効な場合のフォールバック（タグは下の img で発火） -->
    <noscript>
        <meta http-equiv="refresh" content="1;url=https://lin.ee/43uE1gC">
        <img height="1" width="1" style="display:none"
             src="https://www.facebook.com/tr?id=1143852114505095&ev=Lead&noscript=1" alt="">
    </noscript>

    <script>
    (function () {
        var DEST = 'https://lin.ee/43uE1gC';
        // タグの発火を待つ最小待機時間（ms）。短いほどスムーズ、長いほど発火が確実。
        // Lead は <head> の fbq('track', 'Lead') で発火済み。二重計上を避けるため
        // 画像ビーコンは使わず、送信が完了するのを待ってから転送するだけにする。
        var WAIT_MS = 1000;

        var done = false;
        function go() {
            if (done) return;
            done = true;
            window.location.replace(DEST);
        }

        setTimeout(go, WAIT_MS);
    })();
    </script>
</body>
</html>
