<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="5;url=https://sites.google.com/view/buchiiyashi">
    <title>ぶち癒しフェスタin東京 - サイト移転のお知らせ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #fff5f7;
            color: #4a4a4a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            text-align: center;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            padding: 3rem 2.5rem;
            max-width: 540px;
            width: 100%;
        }

        h1 {
            font-size: 1.5rem;
            color: #9d174d;
            margin-bottom: 1rem;
        }

        .notice {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #555;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            background-color: #be185d;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 700;
            padding: 0.85rem 2.5rem;
            border-radius: 9999px;
            text-decoration: none;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: #9d174d;
        }

        .countdown {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #888;
        }

        .logo {
            font-size: 1.1rem;
            font-weight: 700;
            color: #9d174d;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">ぶち癒しフェスタ in 東京</div>
        <h1>サイト移転のお知らせ</h1>
        <p class="notice">
            当サイトは新しいサイトへ移転しました。<br>
            自動的に移動しない場合は、下のボタンをクリックしてください。
        </p>
        <a class="btn" href="https://sites.google.com/view/buchiiyashi">
            新しいサイトへ移動する
        </a>
        <p class="countdown" id="countdown">5秒後に自動的に移動します...</p>
    </div>

    <script>
        var sec = 5;
        var el = document.getElementById('countdown');
        var timer = setInterval(function () {
            sec--;
            el.textContent = sec + '秒後に自動的に移動します...';
            if (sec <= 0) {
                clearInterval(timer);
                window.location.href = 'https://sites.google.com/view/buchiiyashi';
            }
        }, 1000);
    </script>
</body>
</html>
