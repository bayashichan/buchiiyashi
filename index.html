<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ぶち癒しフェスタ in 東京</title>

    <!-- ===================================================================
         トラッキングタグ（計測用）
         Google サイトには埋め込めないタグをこの中継ページで発火させる。
         ここに他のタグ（Google 広告 / TikTok 等）を追加する場合は、
         下の firePixels() 内のビーコン送信も合わせて追記すること。
         =================================================================== -->
    <!-- Meta Pixel -->
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '1143852114505095');
    fbq('track', 'PageView');
    </script>
    <!-- End Meta Pixel -->

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Yu Gothic', -apple-system, sans-serif;
            background-color: #fff5f7;
            color: #9d174d;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            opacity: 0;
            animation: fadeIn 0.3s ease forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }
        .spinner {
            width: 34px;
            height: 34px;
            border: 3px solid rgba(190, 24, 93, 0.2);
            border-top-color: #be185d;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { font-size: 0.9rem; letter-spacing: 0.05em; color: #be185d; }
        .fallback { font-size: 0.8rem; margin-top: 8px; }
        .fallback a { color: #9d174d; }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <div class="loader-text">読み込み中…</div>
        <div class="fallback">
            自動で移動しない場合は
            <a href="https://sites.google.com/view/buchiiyashi">こちら</a>
        </div>
    </div>

    <!-- JS が無効な場合のフォールバック（タグは下の img で発火） -->
    <noscript>
        <meta http-equiv="refresh" content="1;url=https://sites.google.com/view/buchiiyashi">
        <img height="1" width="1" style="display:none"
             src="https://www.facebook.com/tr?id=1143852114505095&ev=PageView&noscript=1" alt="">
    </noscript>

    <script>
    (function () {
        var DEST = 'https://sites.google.com/view/buchiiyashi';
        var PIXEL_ID = '1143852114505095';
        var EVENT = 'PageView';
        var MAX_WAIT = 2500;         // これ以上は待たずに転送（保険・ms）
        var BUFFER_AFTER_LOAD = 400; // タグ読込後、送信完了を待つ時間（ms）

        var done = false;
        function go() {
            if (done) return;
            done = true;
            window.location.replace(DEST);
        }

        // fbevents.js が読み込めない/ブロックされた時だけの最終手段。
        // fbq が未送信のケースでのみ呼ぶので二重計上しない。
        function fireFallbackBeacon() {
            var img = new Image();
            img.src = 'https://www.facebook.com/tr?id=' + PIXEL_ID +
                      '&ev=' + EVENT + '&noscript=1&rnd=' + Date.now();
        }

        // PageView は <head> の fbq('track', 'PageView') で発火予約済み。
        // 固定時間ではなく、fbevents.js が実際に読み込まれて送信されるのを
        // 待ってから転送する（IAB など低速環境でタグが消えるのを防ぐ）。
        // 読込完了の合図＝ fbq.callMethod がセットされること。
        var start = Date.now();
        (function waitAndGo() {
            if (window.fbq && window.fbq.callMethod) {
                setTimeout(go, BUFFER_AFTER_LOAD);
            } else if (Date.now() - start >= MAX_WAIT) {
                fireFallbackBeacon();
                setTimeout(go, 300);
            } else {
                setTimeout(waitAndGo, 50);
            }
        })();
    })();
    </script>
</body>
</html>
