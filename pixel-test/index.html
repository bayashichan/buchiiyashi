<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ピクセル診断</title>

    <!-- Meta Pixel（診断用・転送はしない） -->
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '1143852114505095');
    fbq('track', 'PageView');
    </script>

    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, "Hiragino Sans", sans-serif;
            margin: 0; padding: 16px;
            background: #0d1b2a; color: #e6edf3;
            font-size: 15px; line-height: 1.6;
        }
        h1 { font-size: 18px; margin: 0 0 4px; }
        .lead { color: #ffd166; font-size: 14px; margin: 0 0 16px; }
        ul { list-style: none; margin: 0; padding: 0; }
        li {
            display: flex; align-items: flex-start; gap: 8px;
            padding: 10px 12px; margin-bottom: 8px;
            background: #16263a; border-radius: 8px;
            word-break: break-all;
        }
        .mark { font-size: 18px; flex-shrink: 0; width: 22px; text-align: center; }
        .ok { color: #4ade80; }
        .ng { color: #f87171; }
        .wait { color: #fbbf24; }
        .k { font-weight: bold; }
        .v { color: #9fb3c8; font-size: 13px; }
        .note { margin-top: 16px; font-size: 13px; color: #9fb3c8; }
    </style>
</head>
<body>
    <h1>ピクセル診断ページ</h1>
    <p class="lead">この画面をスクショして送ってください</p>
    <ul id="board"></ul>
    <p class="note">※このページは転送しません。計測が届くか・どこで止まるかを確認するための診断用です。</p>

    <script>
    (function () {
        var PIXEL_ID = '1143852114505095';
        var board = document.getElementById('board');
        var rows = {};

        function row(id, key) {
            var li = document.createElement('li');
            var m = document.createElement('span'); m.className = 'mark wait'; m.textContent = '⏳';
            var body = document.createElement('div');
            var k = document.createElement('div'); k.className = 'k'; k.textContent = key;
            var v = document.createElement('div'); v.className = 'v'; v.textContent = '確認中…';
            body.appendChild(k); body.appendChild(v);
            li.appendChild(m); li.appendChild(body);
            board.appendChild(li);
            rows[id] = { mark: m, v: v };
        }
        function set(id, state, text) {
            var r = rows[id]; if (!r) return;
            r.mark.className = 'mark ' + (state === true ? 'ok' : state === false ? 'ng' : 'wait');
            r.mark.textContent = state === true ? '✓' : state === false ? '✗' : '⏳';
            if (text != null) r.v.textContent = text;
        }

        // 行を用意
        row('ua', '① ブラウザ判定（UA）');
        row('online', '② オンライン状態');
        row('fbq', '③ fbq 定義');
        row('fbevents', '④ fbevents.js 読み込み（connect.facebook.net）');
        row('tr', '⑤ facebook.com/tr への到達');
        row('beacon', '⑥ テストビーコン送信');

        // ① UA
        var ua = navigator.userAgent || '(取得不可)';
        var isIAB = /Instagram|FBAN|FBAV|FB_IAB/i.test(ua);
        set('ua', isIAB ? true : null, (isIAB ? '【アプリ内ブラウザ検出】 ' : '【通常ブラウザ?】 ') + ua);

        // ② online
        set('online', navigator.onLine === true, navigator.onLine ? 'オンライン' : 'オフラインの可能性');

        // ③ fbq
        set('fbq', typeof window.fbq === 'function', 'typeof fbq = ' + (typeof window.fbq));

        // ④ fbevents.js 読み込み（callMethod がセットされたら完了）
        var t0 = Date.now();
        (function pollFbevents() {
            if (window.fbq && window.fbq.callMethod) {
                set('fbevents', true, '読み込み完了（' + (Date.now() - t0) + 'ms）→ fbq送信も試行済み');
            } else if (Date.now() - t0 > 8000) {
                set('fbevents', false, '8秒待っても読み込まれず（ブロック/不達の可能性）');
            } else {
                set('fbevents', null, '待機中…（' + Math.round((Date.now() - t0) / 1000) + '秒）');
                setTimeout(pollFbevents, 300);
            }
        })();

        // ⑤ facebook.com/tr への到達（画像が返れば到達＝onload、失敗＝onerror）
        var trImg = new Image();
        trImg.onload = function () { set('tr', true, '到達OK（Metaのサーバーに届いています）'); };
        trImg.onerror = function () { set('tr', false, '到達失敗（IABが facebook.com をブロックしている可能性大）'); };
        trImg.src = 'https://www.facebook.com/tr?id=' + PIXEL_ID + '&ev=PageView&rnd=' + Date.now();

        // ⑥ テストビーコン送信（URL に ?test_event_code=XXXX があればコードを付与）
        var m = /[?&]test_event_code=([^&#]+)/.exec(window.location.search);
        var code = m ? decodeURIComponent(m[1]) : '';
        var beaconUrl = 'https://www.facebook.com/tr?id=' + PIXEL_ID + '&ev=Lead' +
                        (code ? '&test_event_code=' + encodeURIComponent(code) : '') +
                        '&rnd=' + Date.now();
        var bimg = new Image();
        bimg.src = beaconUrl;
        set('beacon', true, code
            ? 'Lead を送信（test_event_code=' + code + '）'
            : 'Lead を送信（テストコード無し。URLに ?test_event_code=XXXX を付けるとテストイベント画面に出ます）');
    })();
    </script>
</body>
</html>
